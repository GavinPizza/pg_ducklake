# Configuration
#
# pg_ducklake only: this suite used to preload pg_duckdb as well (and create
# its extension) as a two-consumers coexistence test, but coexistence is
# currently broken at both levels -- CREATE EXTENSION collides on the public
# read_csv/read_parquet stubs, and with only the library preloaded the specs
# fail on Linux cassert builds. Re-add pg_duckdb here once SQL-level
# coexistence is fixed; until then isolation covers pg_ducklake alone.

shared_preload_libraries = 'pg_ducklake'
log_temp_files = -1
ducklake.maintenance_enabled = false
